name: yool-cv-analyzer-fullstack

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npass
      POSTGRES_DB: n8n_demo
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_demo"]
      interval: 5s
      timeout: 5s
      retries: 20

  tika:
    image: apache/tika:latest-full
    restart: unless-stopped
    ports:
      - "9998:9998"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      tika:
        condition: service_started

    ports:
      - "5679:5678"

    # Fix DNS issues (Google APIs etc.)
    dns:
      - 8.8.8.8
      - 1.1.1.1

    # Allow container to access host services (Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - N8N_LISTEN_ADDRESS=0.0.0.0
      - GENERIC_TIMEZONE=Europe/Casablanca

      # Restrict filesystem access
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n-files

      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679/
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # Database config
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_demo
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npass

    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./pdfs:/home/node/.n8n-files/pdfs
      - ./output:/home/node/.n8n-files/output
